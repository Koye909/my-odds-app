<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Odds Converter</title>
    <style>
        :root { --main: #6c5ce7; --bg: #f3f4f6; --box-border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .section { background: #ffffff; border: 1.5px solid var(--box-border); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .input-group { background: #f8fafc; border: 1px solid var(--box-border); padding: 8px 12px; border-radius: 10px; }
        label { font-size: 11px; color: #64748b; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 2px; }
        input { width: 100%; border: none; background: transparent; font-size: 16px; font-weight: 600; outline: none; color: #1e293b; }
        button { width: 100%; background: var(--main); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .res-pill { margin-top: 15px; padding: 12px; border-radius: 12px; color: white; text-align: center; display: none; }
        .res-main { font-weight: 800; font-size: 1.3rem; display: block; letter-spacing: 0.5px; }
        .res-sub { font-size: 11px; opacity: 0.7; font-weight: normal; margin-top: 4px; display: block; }
        .zm { font-size: 11px; color: #94a3b8; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="text-align:center; color:var(--main); margin-bottom: 25px;">PRO ODDS CONVERTER</h3>
        <div class="input-group" style="background: #fff1f2; border-color: #fecaca; margin-bottom: 20px;">
            <label style="color: #e11d48;">Owner Profit (%)</label>
            <input type="number" id="profit" value="5">
        </div>
        <div class="section">
            <div class="input-group"><label>Body Line</label><input type="text" id="hdpLine" value="1.5"></div>
            <div class="grid-2">
                <div class="input-group"><label>Home Odds</label><input type="number" id="home" step="0.001" value="1.95"></div>
                <div class="input-group"><label>Away Odds</label><input type="number" id="away" step="0.001" value="1.90"></div>
            </div>
            <div id="zmBody" class="zm">Zero Margin: - / -</div>
        </div>
        <div class="section">
            <div class="input-group"><label>Goal Line</label><input type="text" id="goalLine" value="3.5"></div>
            <div class="grid-2">
                <div class="input-group"><label>Over Odds</label><input type="number" id="over" step="0.001" value="2.05"></div>
                <div class="input-group"><label>Under Odds</label><input type="number" id="under" step="0.001" value="1.80"></div>
            </div>
            <div id="zmGoal" class="zm">Zero Margin: - / -</div>
        </div>
        <button onclick="calc()">တွက်ချက်မည်</button>
        <div id="bodyPill" class="res-pill" style="background: #2563eb;">
            <span id="bodyRes" class="res-main"></span>
            <span id="bodyRaw" class="res-sub"></span>
        </div>
        <div id="goalPill" class="res-pill" style="background: #dc2626;">
            <span id="goalRes" class="res-main"></span>
            <span id="goalRaw" class="res-sub"></span>
        </div>
    </div>
    <script>
        async function calc() {
            try {
                const res = await fetch('/convert', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        hdpLine: document.getElementById('hdpLine').value,
                        home: document.getElementById('home').value,
                        away: document.getElementById('away').value,
                        goalLine: document.getElementById('goalLine').value,
                        over: document.getElementById('over').value,
                        under: document.getElementById('under').value,
                        profit: document.getElementById('profit').value
                    })
                });
                const data = await res.json();
                document.getElementById('zmBody').innerText = "Zero Margin: " + data.zmBody;
                document.getElementById('zmGoal').innerText = "Zero Margin: " + data.zmGoal;
                document.getElementById('bodyPill').style.display = 'block';
                document.getElementById('bodyRes').innerText = data.body;
                document.getElementById('bodyRaw').innerText = data.bodyRaw;
                document.getElementById('goalPill').style.display = 'block';
                document.getElementById('goalRes').innerText = data.goal;
                document.getElementById('goalRaw').innerText = data.goalRaw;
            } catch (e) { alert("Server connection failed!"); }
        }
    </script>
</body>
</html>
