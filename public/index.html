<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odds Converter</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h3 { text-align: center; margin-bottom: 20px; font-size: 1.2rem; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 0.85rem; color: #555; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .result-box { margin-top: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; text-align: center; }
        .res-item { padding: 8px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 0.95rem; }
        .res-item:last-child { border-bottom: none; }
        .home-green { color: #28a745; }
        .away-red { color: #dc3545; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Odds Converter</h3>
        <div class="input-group">
            <label>ဘော်ဒီ ပေါက်ကြေး (-0.75, 2.5)</label>
            <input type="text" id="hdpLine" placeholder="e.g. -0.75">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="number" id="home" step="0.001" placeholder="Home Odds">
                <input type="number" id="away" step="0.001" placeholder="Away Odds">
            </div>
        </div>
        <hr>
        <div class="input-group">
            <label>ဂိုးပေါင်း ပေါက်ကြေး (3.0, 2.5)</label>
            <input type="text" id="goalLine" placeholder="e.g. 3.0">
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="number" id="over" step="0.001" placeholder="Over Odds">
                <input type="number" id="under" step="0.001" placeholder="Under Odds">
            </div>
        </div>
        <button onclick="convert()">တွက်မည်</button>
        <div class="result-box">
            <div id="bodyRes" class="res-item">ဘော်ဒီ ရလဒ်</div>
            <div id="goalRes" class="res-item">ဂိုးပေါင်း ရလဒ်</div>
        </div>
    </div>

    <script>
        async function convert() {
            const data = {
                hdpLine: document.getElementById('hdpLine').value,
                home: document.getElementById('home').value,
                away: document.getElementById('away').value,
                goalLine: document.getElementById('goalLine').value,
                over: document.getElementById('over').value,
                under: document.getElementById('under').value
            };
            const res = await fetch('/convert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            const bEl = document.getElementById('bodyRes');
            bEl.innerText = result.body.text;
            bEl.className = 'res-item ' + result.body.className;

            const gEl = document.getElementById('goalRes');
            gEl.innerText = result.goal.text;
            gEl.className = 'res-item ' + result.goal.className;
        }
    </script>
</body>
</html>
